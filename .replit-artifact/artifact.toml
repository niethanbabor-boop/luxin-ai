kind = "mobile"
previewPath = "/"
title = "Luxin AI Assistant"
version = "1.0.0"
id = "artifacts/luxin-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25969

[services.development]
run = "pnpm --filter @workspace/luxin-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxin-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/luxin-ai", "run", "serve" ]

[services.env]
PORT = "25969"
BASE_PATH = "/"
